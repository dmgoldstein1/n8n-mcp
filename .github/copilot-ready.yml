name: Mark Copilot PRs Ready for Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  ready-for-review:
    if: github.event.pull_request.user.login == 'github-copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Set PR to Ready for Review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr ready "$PR_URL"
